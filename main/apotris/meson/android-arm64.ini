# Manual cross file. Prefer build.ps1 / CI: it generates android-arm64-auto.ini from your newest NDK under
# %LOCALAPPDATA%\Android\Sdk\ndk (detects llvm prebuilt host folder, e.g. windows-x86_64).
[constants]
ndk_path = 'C:/Users/sanay/AppData/Local/Android/Sdk/ndk/26.1.10909125'
toolchain = ndk_path + '/toolchains/llvm/prebuilt/windows-x86_64/bin'
sysroot = ndk_path + '/toolchains/llvm/prebuilt/windows-x86_64/sysroot'
api = '34'

[binaries]
c = toolchain + '/aarch64-linux-android' + api + '-clang.cmd'
cpp = toolchain + '/aarch64-linux-android' + api + '-clang++.cmd'
ar = toolchain + '/llvm-ar.exe'
strip = toolchain + '/llvm-strip.exe'
ranlib = toolchain + '/llvm-ranlib.exe'

[built-in options]
c_args = ['-DVAR_ARRAYS', '-D_FILE_OFFSET_BITS=64', '--sysroot=' + sysroot]
cpp_args = ['-DVAR_ARRAYS', '-D_FILE_OFFSET_BITS=64', '--sysroot=' + sysroot]
c_link_args = ['--sysroot=' + sysroot]
cpp_link_args = ['--sysroot=' + sysroot]

[host_machine]
system = 'android'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
