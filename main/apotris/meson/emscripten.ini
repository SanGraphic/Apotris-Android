[constants]
cflags = ['-msimd128', '-mbulk-memory', '-mmutable-globals', '-msign-ext', '-mnontrapping-fptoint']
ldflags = ['-v', '-sWASM_BIGINT', '-sMIN_FIREFOX_VERSION=89', '-sMIN_CHROME_VERSION=91']
# 'toolchain' must be supplied somehow
# either replace this with the /absolute/path/to/emsdk
# ... or supply a second machine file with this variable defined
#toolchain = ''

[binaries]
ar = 'emar'
c = 'emcc'
cpp = 'em++'
ranlib = 'emranlib'
file_packager = 'tools/file_packager'

[sdl2:project options]
use_audio_alsa = 'disabled'
use_audio_pulseaudio = 'disabled'
use_loadso = 'disabled'
use_threads = 'disabled'
use_video_wayland = 'disabled'
use_video_x11 = 'disabled'

[host_machine]
cpu = 'post-mvp'
cpu_family = 'wasm32'
endian = 'little'
system = 'emscripten'

[cmake]
CMAKE_BUILD_WITH_INSTALL_RPATH     = 'ON'
CMAKE_FIND_ROOT_PATH_MODE_PROGRAM  = 'NEVER'
CMAKE_FIND_ROOT_PATH_MODE_LIBRARY  = 'ONLY'
CMAKE_FIND_ROOT_PATH_MODE_INCLUDE  = 'ONLY'
CMAKE_FIND_ROOT_PATH_MODE_PACKAGE  = 'ONLY'
