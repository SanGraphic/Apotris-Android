# Publishes or updates the `nightly` tag and GitHub Release (notes + APK asset).
# Run manually: Actions → "Publish nightly GitHub Release" → Run workflow.
# Requires releases/apotris-universal.apk on the branch you run against (commit to main first).

name: Publish nightly GitHub Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-github-release
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify universal APK is present
        run: test -f releases/apotris-universal.apk

      - name: Point nightly tag at current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin refs/tags/nightly -f

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Apotris Android — Nightly
          body_path: .github/nightly-release-notes.md
          files: releases/apotris-universal.apk
          prerelease: true
          make_latest: true
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
