# Nightly signed APKs using the same PowerShell pipelines as locally (Meson + Gradle + Uber signer).
#
# Artifacts: Actions → "Nightly Android build" → latest run → Artifacts
#
# Optional release signing: add repository secrets (Settings → Secrets and variables → Actions):
#   APOTRIS_KEYSTORE_B64   — base64-encoded .jks file (e.g. certutil /encode or base64 -w0)
#   APOTRIS_KEYSTORE_PASS  — keystore password
#   APOTRIS_KEY_ALIAS      — key alias
#   APOTRIS_KEY_PASS       — key password
# If APOTRIS_KEYSTORE_B64 is unset, a stable CI keystore is restored from cache (or created once).

name: Nightly Android build

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:
    inputs:
      build_universal:
        description: "Also build multi-ABI universal APK (slow)"
        required: false
        default: false
        type: boolean

concurrency:
  group: nightly-android-${{ github.workflow }}
  cancel-in-progress: true

# Artifact upload needs write on actions in repos with restricted default GITHUB_TOKEN
permissions:
  contents: write
  actions: write

jobs:
  arm64:
    name: arm64-v8a APK
    runs-on: windows-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Vendored main/apotris (no .git) cannot run git -C main/apotris submodule; only clone-as-submodule setups need this.
      - name: Init submodules inside main/apotris (git clone only)
        shell: pwsh
        run: |
          if ((Test-Path "main/apotris/.gitmodules") -and (Test-Path "main/apotris/.git")) {
            git -C main/apotris submodule update --init --recursive
          }

      - name: Enable long paths for Git
        shell: pwsh
        run: git config --global core.longpaths true

      # general-tools is a gitea submodule in upstream Apotris but not vendored in this repo; Meson needs it for padbin etc.
      - name: Sync Apotris gitea subprojects
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          ./tools/ci/sync-apotris-subprojects.ps1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        shell: pwsh
        run: python -m pip install --upgrade pip meson ninja

      - name: Set up Android SDK + NDK 26.1
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Point Apotris scripts at CI SDK/NDK
        shell: pwsh
        run: |
          $sdk = $env:ANDROID_SDK_ROOT
          if ([string]::IsNullOrWhiteSpace($sdk)) { throw "ANDROID_SDK_ROOT not set after setup-android" }
          $ndkRoot = Join-Path $sdk "ndk"
          if (-not (Test-Path $ndkRoot)) { throw "ndk folder missing under SDK: $ndkRoot" }
          $ndk = Get-ChildItem $ndkRoot -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match '^26\.' } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $ndk) { $ndk = Get-ChildItem $ndkRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1 }
          if (-not $ndk) { throw "No NDK under $ndkRoot" }
          $ndkFull = $ndk.FullName
          Write-Host "Using NDK: $ndkFull"
          "ANDROID_NDK_HOME=$ndkFull" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore cached CI keystore
        id: ci-ks
        uses: actions/cache@v4
        with:
          path: apotris-ci-nightly.jks
          key: apotris-ci-nightly-keystore-v1-${{ runner.os }}

      - name: Create CI keystore (cache miss)
        if: steps.ci-ks.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & keytool -genkeypair `
            -keystore apotris-ci-nightly.jks `
            -alias apotris-nightly `
            -keyalg RSA -keysize 2048 -validity 10000 `
            -storepass changeme -keypass changeme `
            -dname "CN=Apotris Nightly CI, O=CI, C=US"

      - name: Run build.ps1
        shell: pwsh
        env:
          SECRET_JKS_B64: ${{ secrets.APOTRIS_KEYSTORE_B64 }}
          SECRET_KS_PASS: ${{ secrets.APOTRIS_KEYSTORE_PASS }}
          SECRET_ALIAS: ${{ secrets.APOTRIS_KEY_ALIAS }}
          SECRET_KEY_PASS: ${{ secrets.APOTRIS_KEY_PASS }}
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          Set-Location $env:GITHUB_WORKSPACE
          if ($env:SECRET_JKS_B64) {
            $out = Join-Path $PWD "signing-release.jks"
            [IO.File]::WriteAllBytes($out, [Convert]::FromBase64String($env:SECRET_JKS_B64))
            $env:APOTRIS_KEYSTORE = $out
            $env:APOTRIS_KEYSTORE_PASS = $env:SECRET_KS_PASS
            $env:APOTRIS_KEY_ALIAS = $env:SECRET_ALIAS
            $env:APOTRIS_KEY_PASS = $env:SECRET_KEY_PASS
          } else {
            $env:APOTRIS_KEYSTORE = Join-Path $PWD "apotris-ci-nightly.jks"
            $env:APOTRIS_KEYSTORE_PASS = "changeme"
            $env:APOTRIS_KEY_ALIAS = "apotris-nightly"
            $env:APOTRIS_KEY_PASS = "changeme"
          }
          ./build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: apotris-arm64-nightly
          path: apotris-arm64-v8a-*.apk
          if-no-files-found: error
          retention-days: 21

  universal:
    name: Universal (multi-ABI) APK
    # Boolean workflow_dispatch inputs are strings in github.event.inputs ('true' / 'false')
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_universal == 'true'
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init submodules inside main/apotris (git clone only)
        shell: pwsh
        run: |
          if ((Test-Path "main/apotris/.gitmodules") -and (Test-Path "main/apotris/.git")) {
            git -C main/apotris submodule update --init --recursive
          }

      - name: Enable long paths for Git
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Sync Apotris gitea subprojects
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          ./tools/ci/sync-apotris-subprojects.ps1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        shell: pwsh
        run: python -m pip install --upgrade pip meson ninja

      - name: Set up Android SDK + NDK 26.1
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Point Apotris scripts at CI SDK/NDK
        shell: pwsh
        run: |
          $sdk = $env:ANDROID_SDK_ROOT
          if ([string]::IsNullOrWhiteSpace($sdk)) { throw "ANDROID_SDK_ROOT not set" }
          $ndkRoot = Join-Path $sdk "ndk"
          if (-not (Test-Path $ndkRoot)) { throw "ndk folder missing under SDK: $ndkRoot" }
          $ndk = Get-ChildItem $ndkRoot -Directory | Where-Object { $_.Name -match '^26\.' } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $ndk) { $ndk = Get-ChildItem $ndkRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1 }
          if (-not $ndk) { throw "No NDK under $ndkRoot" }
          $ndkFull = $ndk.FullName
          Write-Host "Using NDK: $ndkFull"
          "ANDROID_NDK_HOME=$ndkFull" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore cached CI keystore
        id: ci-ks-u
        uses: actions/cache@v4
        with:
          path: apotris-ci-nightly.jks
          key: apotris-ci-nightly-keystore-v1-${{ runner.os }}

      - name: Create CI keystore (cache miss)
        if: steps.ci-ks-u.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & keytool -genkeypair `
            -keystore apotris-ci-nightly.jks `
            -alias apotris-nightly `
            -keyalg RSA -keysize 2048 -validity 10000 `
            -storepass changeme -keypass changeme `
            -dname "CN=Apotris Nightly CI, O=CI, C=US"

      - name: Run build-universal.ps1
        shell: pwsh
        env:
          SECRET_JKS_B64: ${{ secrets.APOTRIS_KEYSTORE_B64 }}
          SECRET_KS_PASS: ${{ secrets.APOTRIS_KEYSTORE_PASS }}
          SECRET_ALIAS: ${{ secrets.APOTRIS_KEY_ALIAS }}
          SECRET_KEY_PASS: ${{ secrets.APOTRIS_KEY_PASS }}
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          Set-Location $env:GITHUB_WORKSPACE
          if ($env:SECRET_JKS_B64) {
            $out = Join-Path $PWD "signing-release.jks"
            [IO.File]::WriteAllBytes($out, [Convert]::FromBase64String($env:SECRET_JKS_B64))
            $env:APOTRIS_KEYSTORE = $out
            $env:APOTRIS_KEYSTORE_PASS = $env:SECRET_KS_PASS
            $env:APOTRIS_KEY_ALIAS = $env:SECRET_ALIAS
            $env:APOTRIS_KEY_PASS = $env:SECRET_KEY_PASS
          } else {
            $env:APOTRIS_KEYSTORE = Join-Path $PWD "apotris-ci-nightly.jks"
            $env:APOTRIS_KEYSTORE_PASS = "changeme"
            $env:APOTRIS_KEY_ALIAS = "apotris-nightly"
            $env:APOTRIS_KEY_PASS = "changeme"
          }
          ./build-universal.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: apotris-universal-nightly
          path: apotris-universal-*.apk
          if-no-files-found: error
          retention-days: 21

  publish-release:
    name: Publish nightly GitHub Release
    runs-on: ubuntu-latest
    needs: [arm64, universal]
    if: always() && needs.arm64.result == 'success' && (needs.universal.result == 'success' || needs.universal.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: apotris-arm64-nightly
          path: dist/arm64
      - uses: actions/download-artifact@v4
        if: needs.universal.result == 'success'
        with:
          name: apotris-universal-nightly
          path: dist/universal
      - name: Prepare release APK assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          arm64_apk="$(find dist/arm64 -type f -name '*.apk' | head -n 1)"
          test -n "$arm64_apk"
          cp "$arm64_apk" release-assets/apotris-arm64-v8a.apk

          if [ -d dist/universal ]; then
            universal_apk="$(find dist/universal -type f -name '*.apk' | head -n 1)"
            if [ -n "$universal_apk" ]; then
              cp "$universal_apk" release-assets/apotris-universal.apk
            fi
          fi

          ls -la release-assets
      - name: Point nightly tag at current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin refs/tags/nightly -f
      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Apotris Android — Nightly
          body_path: .github/nightly-release-notes.md
          files: release-assets/*.apk
          prerelease: true
          make_latest: false
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
